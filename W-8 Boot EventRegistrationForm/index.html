<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Registration</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <div class="container mt-5 mb-5">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
          <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-4 p-sm-5">
              <h1 class="text-center mb-4 text-primary fw-bold">
                Event Registration
              </h1>

              <div class="row">
                <div class="col-md-6">
                  <form class="needs-validation" novalidate>
                    <div class="form-floating mb-3">
                      <input
                        class="form-control"
                        type="text"
                        id="name"
                        placeholder="Full Name"
                        pattern="[a-zA-z\s]+"
                        required
                      />
                      <label for="name" class="form-label">Full Name</label>
                      <div class="invalid-feedback">
                        Please provide valid full name.
                      </div>
                      <div class="valid-feedback">Looks good!</div>
                    </div>

                    <div class="mb-3 px-2 form-control">
                      <label class="form-label text-muted small mb-2 d-block"
                        >Gender</label
                      >
                      <div class="form-check form-check-inline">
                        <input
                          class="form-check-input"
                          type="radio"
                          name="gender"
                          id="male"
                          value="male"
                          required
                        />
                        <label class="form-check-label" for="male">Male</label>
                      </div>
                      <div class="form-check form-check-inline">
                        <input
                          class="form-check-input"
                          type="radio"
                          name="gender"
                          id="female"
                          value="female"
                        />
                        <label class="form-check-label" for="female"
                          >Female</label
                        >
                      </div>

                      <div class="invalid-feedback" style="display: none">
                        Please select a gender.
                      </div>
                    </div>

                    <div class="form-floating mb-3">
                      <input
                        class="form-control"
                        type="tel"
                        id="phn"
                        placeholder="Phone"
                        pattern="[0-9]{10}"
                        required
                        data-bs-toggle="tooltip"
                        data-bs-placement="right"
                        title="Format: 10 digits without spaces"
                      />
                      <label class="form-label" for="phn">Phone</label>
                      <div class="valid-feedback">Looks good!</div>
                      <div class="invalid-feedback">
                        Please enter exactly 10 digits.
                      </div>
                    </div>

                    <div class="form-floating mb-3">
                      <input
                        class="form-control"
                        type="email"
                        id="email"
                        placeholder="Email"
                        required
                      />
                      <label class="form-label" for="email">Email</label>
                      <div class="valid-feedback">Looks good!</div>
                      <div class="invalid-feedback">
                        Please provide a valid email.
                      </div>
                    </div>

                    <div class="form-floating mb-3">
                      <select id="pass" class="form-select" required>
                        <option value="" selected disabled>
                          Choose a Pass Type...
                        </option>
                        <option value="general">General</option>
                        <option value="vip">VIP</option>
                        <option value="student">Student</option>
                      </select>
                      <label for="pass">Pass Type</label>
                      <div class="valid-feedback">Looks good!</div>
                      <div class="invalid-feedback">
                        Please select a pass type.
                      </div>
                    </div>

                    <div class="form-check mb-4">
                      <input
                        class="form-check-input"
                        type="checkbox"
                        name=""
                        id="terms"
                        required
                      />
                      <label class="form-check-label" for="terms"
                        >I agree to the Terms & Conditions</label
                      >

                      <div class="invalid-feedback">
                        You must agree before submitting.
                      </div>
                    </div>

                    <button class="btn btn-primary w-100 py-2" type="submit">
                      Register Now
                    </button>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // 1. Grab your form
      let myForm = document.querySelector(".needs-validation");

      // 2. Listen for the submit button click
      myForm.addEventListener("submit", function (event) {
        // 3. If the HTML5 rules (required, pattern) fail, stop the form!
        if (!myForm.checkValidity()) {
          event.preventDefault();
        } else {
          alert("Form Accepted! Registration Successful.");

          // OPTIONAL EXAM TRICK: Add this line to stop the page from
          // refreshing so the examiner can actually see your green checkmarks!
          event.preventDefault();
        }

        // 4. Turn on Bootstrap's red/green colors
        myForm.classList.add("was-validated");
      });
    </script>
  </body>
</html>
