<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App Ajax</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
</head>
<body class="bg-dark">
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="row w-100 justify-content-center">
            
            <div class="col-md-8 col-lg-6">
                <h1 class="text-center text-white mb-4">Weather Details</h1>
                
                <div class="card mb-3">
                    <div class="card-body">
                        <label class="form-label text-muted" for="cityInput">City</label>
                        
                        <div class="input-group">
                            <input id="cityInput" class="form-control" placeholder="Enter City Name (e.g., pune)" type="text">
                            <button class="btn btn-primary" id="searchBtn" type="button">Fetch Weather</button>
                        </div>

                        <div id="errorMsg" class="text-danger mt-3 fw-bold" style="display: none;">
                            <p class="mb-0">City Not Found in the Database!</p>
                        </div>
                    </div>
                </div>

                <div class="card" id="resultsCard" style="display: none;">
                    <div class="card-body details">
                        
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="script.js">
        
    </script>
</body>
</html>
