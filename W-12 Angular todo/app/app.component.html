<div class="container">
  <div class="row">
    <div class="col-md-8 mt-5">
      <h2>Angular To-Do List</h2>
      <div class="input-group mt-5">
        <input class="form-control" type="text" [(ngModel)]="newTask" placeholder="Enter the Task">
        <button class="btn btn-primary" (click) = "addTask()">Add Task</button>
      </div>
      <div class=" alert alert-danger mt-3" *ngIf="errorMsg">
        <p class="text-danger">{{errorMsg}}</p>
      </div>
      <div class="alert alert-success mt-3" *ngIf="successMsg">
        <p class="text-success">{{successMsg}}</p>
      </div>
    </div>

  </div>

  <div class="alert alert-info mt-5" *ngIf="tasks.length === 0">
    You have no tasks! Add one to get started.
  </div>

  <div class="card mt-5" *ngIf="tasks.length > 0">
    <div class="card-title px-3 py-3">
      <h3>List of Tasks...</h3>
    </div>
    <div class="card-body">

      <ul class="container">
        <li class="card flex-row justify-content-between align-items-center px-3 py-3 mb-2" *ngFor="let task of tasks;let i = index">
          <span class="task-text">{{ task }}</span>
          <div class="actions">
            <button class="edit-btn mx-2 btn btn-primary" (click)="editTask(i)">Edit</button>
            <button class="delete-btn btn btn-danger" (click)="deleteTask(i)">Delete</button>
          </div>
        </li>
      </ul>
    </div>

  </div>


</div>
