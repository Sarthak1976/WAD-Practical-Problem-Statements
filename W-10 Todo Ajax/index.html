<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container d-flex justify-content-center mt-5">
      <div class="row w-100 justify-content-center">
        <div class="col-md-8">
          <h1 class="text-primary fw-bold mb-4">To-Do List</h1>
          <div class="card">
            <div class="card-body">
              <div class="input-group">
                <input
                  type="text"
                  class="form-control"
                  id="todo"
                  placeholder="Your Next To-do"
                />
                <button id="addbtn" class="btn btn-primary">Add</button>
              </div>

              <div class="mt-3 d-none" id="errormsg">
                <span class="text-danger"
                  >We were not able to save your task!</span
                >
              </div>
              <div class="mt-3 d-none" id="successmsg">
                <span class="text-success">Task Added successfully !</span>
              </div>
            </div>
          </div>

          <div class="card mt-5 d-none" id="listCard">
            <div class="card-title px-2 py-2 text-primary">
              <h3>Your List</h3>
            </div>
            <div class="card-body">
              <div id="task-list">
                
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
