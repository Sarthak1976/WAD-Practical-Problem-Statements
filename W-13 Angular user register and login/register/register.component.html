<div class="card p-4 mx-auto" style="max-width: 400px;">
    <h3>Register</h3>

    <div class="alert alert-danger" *ngIf="errorMsg"> {{errorMsg}} </div>

    <input type="text" class="form-control mb-3" [(ngModel)]="user.name" placeholder="Enter Full Name">
    <input type="text" class="form-control mb-3" [(ngModel)]="user.username" placeholder="Set Username">
    <input type="password" class="form-control mb-3" [(ngModel)]="user.password" placeholder="Set Password">


    <button type="button" class="btn btn-primary w-100" (click)="onRegister()">Register</button>

    <p class="mt-3 text-center">Already have an account? <a routerLink="/login">Login</a></p>
</div>
