<div class="card p-4 mx-auto" style="max-width: 400px;">
    <h3>Login</h3>

    <div class="alert alert-danger" *ngIf="errorMsg"> {{errorMsg}} </div>

    <input type="text" class="form-control mb-3" [(ngModel)]="loginData.username" placeholder="Enter valid Username">
    <input type="password" class="form-control mb-3" [(ngModel)]="loginData.password" placeholder="Enter Valid Password">


    <button type="button" class="btn btn-success w-100" (click)="onLogin()">Login</button>

    <p class="mt-3 text-center">Don't have an account? <a routerLink="/register">Register Now</a></p>
</div>
