<div class="card p-4 mx-auto" style="max-width: 600px;" *ngIf="activeUser">
    <h2>Welcome, {{activeUser.name}}!</h2>
    <hr>

    <h4>Your Profile</h4>
    <ul class="list-group mb-4">
        <li class="list-group-item"><strong>Name: </strong>{{activeUser.name}}</li>
        <li class="list-group-item"><strong>Username: </strong>{{activeUser.username}}</li>

    </ul>

    <button class="btn btn-danger" (click)="logout()">Log Out</button>
</div>
