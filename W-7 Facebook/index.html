<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
        .fb-header {
        background-color: #3b5998; /* Classic Facebook Blue */
        color: white;
    }
    .fb-signup-btn {
        background-color: #5ea93c; /* Classic Facebook Green */
        border-color: #4b922d;
        color: white;
    }
    .fb-logo-text {
        font-family: Tahoma, Verdana, sans-serif; /* Closest web-safe font to the logo */
        font-weight: bold;
        margin-bottom: 0;
    }
    </style>
</head>
<body>
    <header class="py-3 fb-header">
        <div class="container d-flex justify-content-between align-items-center">
            <div>
                <h1 class="fb-logo-text display-5">facebook</h1>
            </div>

            <div>
                <form class="d-flex align-items-center gap-3">
                    <div>
                        <label class="form-label small mb-0 text-white">Email or Username</label>
                        <input type="text" class="form-control form-control-sm" placeholder="Email">
                        <div class="form-check mt-1">
                            <input class="form-check-input" type="checkbox" id="keepLogged">
                            <label class="form-check-label small" for="keepLogged">Keep me logged in</label>
                        </div>
                    </div>

                    <div>
                        <label class="form-label small mb-0 text-white">Password</label>
                        <input type="text" class="form-control form-control-sm" placeholder="Password">
                        <div class="mt-1">
                            <a href="#" class="small text-decoration-none" style="color: #bec3cb;">Forgotten my password?</a>

                        </div>
                    </div>

                    <div class="mb-4 pt-3">
                        <button type="submit" class="btn btn-sm border bg-white">login</button>

                    </div>

                </form>
            </div>

        </div>
        
        
    </header>

    <div class="container mt-5" style="background-color: #edf0f5; padding-bottom: 50px;">
        <div class="row pt-4">
            <div class="col-md-7 pe-5">
                <h2 class="fw-bold" style="color: #0e385f; font-family: 'Arial', sans-serif;">Facebook is useless without friends.<br>Make More Friends</h2>
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c2/Facebook_network.svg/800px-Facebook_network.svg.png" class="img-fluid mt-4 w-75" alt="Network Image">
            </div>
            <div class="col-md-5">
                <h1 class="display-5 mb-0" style="color: #333;">Create an Account</h1>
                <p class="fs-5 text-dark mb-4">It's free and always will be.</p>

                <form>
                    <div class="row g-0">
                        <div class="col">
                            <input type="text" class="form-control form-control-lg fs-6 rounded-1" placeholder="First Name">
                        </div>
                        <div class="col">
                            <input type="text" class="form-control form-control-lg fs-6 rounded-1" placeholder="Last Name">
                        </div>
                    </div>
                    <div class="">
                        <input type="email" class="form-control form-control-lg fs-6 rounded-1" placeholder="Email">
                    </div>
                    <div class="">
                        <input type="email" class="form-control form-control-lg fs-6 rounded-1" placeholder="Re-enter email">
                    </div>
                    <div class="">
                        <input type="password" class="form-control form-control-lg fs-6 rounded-1" placeholder="Password">
                    </div>
                    <div>
                        <input type="date" class="form-control form-control-lg fs-6 rounded-1">
                    </div>

                    <div class="mt-4" >

                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="grnder" id="male">
                            <label class="form-check-label fs-5" for="male">Male</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="gender" id="female">
                            <label class="form-check-label fs-5" for="female">Female</label>
                        </div>
                        
                        
                    </div>

                    <div class="mt-4">
                       <p class="small text-muted mb-4" style="width: 80%;">By clicking create an account, you agree to our Terms.</p>
                    </div>
                    <div>
                        <button type="button" class="btn fb-signup-btn btn-lg px-5 fw-bold fs-5">Signup</button>
                    </div>

                    <div class="mt-4">
                        <p class="mt-4 pt-4 border-top text-muted small fw-bold"><a href="#" class="text-decoration-none text-muted">Create a page</a> for you.</p>
                    </div>
                </form>


            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
