<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>register/login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
</head>
<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-6">
                
                <div class="card">
                    <div class="card-title">
                        <h2 class="text-center pt-2">Register</h2>
                    </div>
                    <div class="card-body">
                        <form id="regform">
                            <label class="form-label mt-2" for="name">Name</label>
                            <input class="form-control" pattern="[a-zA-Z\s]+" placeholder="Enter Name" type="text" id="name" required>

                            <label class="form-label mt-2" for="username">Username</label>
                            <input class="form-control" placeholder="Set Username" type="text" id="username" required>

                            <label class="form-label mt-2" for="password">Password</label>
                            <input class="form-control" placeholder="Set Password" type="password" id="password" required>

                            <label class="form-label mt-2" for="email">Email</label>
                            <input class="form-control" placeholder="Enter Email" type="email" id="email" required>

                            <label class="form-label mt-2" for="phn">Phone</label>
                            <input class="form-control" pattern="[0-9]{10}" placeholder="Enter Phone Number" type="tel" id="phn" required>

                            <label class="form-label mt-2" for="dob">Date of Birth</label>
                            <input class="form-control" placeholder="Enter Birth Date" type="date" id="dob" required>

                            <label class="form-label mt-2" for="city">City</label>
                            <input class="form-control" placeholder="Enter City" type="text" id="city" required>

                            <label class="form-label mt-2" for="address">Address</label>
                            <input class="form-control" placeholder="Enter Address" type="text" id="address" required>

                            <button id="regBtn" type="button" class="btn btn-primary mt-4 w-100">Register</button>

                            <div id="regError"></div>

                        </form>
                    </div>
                </div>



                <div class="card mt-5 mb-5">
                    <div class="card-title">
                        <h2 class="text-center pt-2">Login</h2>
                    </div>
                    <div class="card-body">
                        <form id="logform">
                
                            <label class="form-label mt-2" for="loginusername">Username</label>
                            <input class="form-control" placeholder="Set Username" type="text" id="loginusername" required>

                            <label class="form-label mt-2" for="loginpassword">Password</label>
                            <input class="form-control" placeholder="Set Password" type="password" id="loginpassword" required>


                            <button id="logBtn" type="button" class="btn btn-success mt-4 w-100">Login</button>

                            <div id="loginError"></div>

                            

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
